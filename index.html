<!DOCTYPE html>
<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <div class="header">
    <img src="./eisenhower-matrix.jpg">
    <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </div>
  <div class="todo">
    <p id="todo__add-task">
      <label for="todo__input">Add Item</label>
      <div class="todo__input-container">
        <input id="todo__input" class="todo__input" type="text">
        <button>Add</button>
      </div>
    </p>
    <h3>Todo</h3>
    <ul id="todo__list-incomplete">
      <li>
        <input type="checkbox">
        <label class="todo__task">Pay Bills</label>
        <input type="text" class="todo__input">
        <button class="todo__button todo__button--edit">Edit</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg">
        </button>
      </li>
      <li class="todo__item todo__item--edit-mode">
        <input type="checkbox">
        <label class="todo__task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="todo__input">
        <button class="todo__button todo__button--save">Save</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
    <h3>Completed</h3>
    <ul id="todo__list-completed">
      <li>
        <input type="checkbox" checked>
        <label class="todo__task">See the Doctor</label>
        <input type="text" class="todo__input">
        <button class="todo__button todo__button--edit">Edit</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>

</html>
