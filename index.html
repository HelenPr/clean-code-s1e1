<!DOCTYPE html>
<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <header class="header">
    <img class="header__image" src="./eisenhower-matrix.jpg" alt="Eisenhower matrix">
    <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  <main class="todo">
    <form id="todo__add-task">
      <label for="todo__input" class="todo__label todo__label--input">Add Item</label>
      <div class="todo__input-container">
        <input id="todo__input" class="todo__input" type="text">
        <button class="todo__button">Add</button>
      </div>
    </form>
    <h3 class="todo__heading">Todo</h3>
    <ul id="todo__list-incomplete" class="todo__list todo__list--incomplete">
      <li class="todo__item">
        <input type="checkbox" class="todo__checkbox">
        <label class="todo__label todo__label--chekbox">Pay Bills</label>
        <input type="text" class="todo__input">
        <button class="todo__button todo__button--edit">Edit</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg" alt="Delete button" class="todo__icon">
        </button>
      </li>
      <li class="todo__item todo__item--edit-mode">
        <input type="checkbox" class="todo__checkbox">
        <label class="todo__label todo__label--chekbox">Go Shopping</label>
        <input type="text" value="Go Shopping" class="todo__input">
        <button class="todo__button todo__button--edit">Save</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg" alt="Delete button" class="todo__icon">
        </button>
      </li>
    </ul>
    <h3 class="todo__heading">Completed</h3>
    <ul id="todo__list-completed" class="todo__list todo__list--completed">
      <li class="todo__item">
        <input type="checkbox" class="todo__checkbox" checked>
        <label class="todo__label todo__label--chekbox">See the Doctor</label>
        <input type="text" class="todo__input">
        <button class="todo__button todo__button--edit">Edit</button>
        <button class="todo__button todo__button--delete">
          <img src="./remove.svg" alt="Delete button" class="todo__icon">
        </button>
      </li>
    </ul>
  </main>
  <script src="app.js"></script>
</body>

</html>
